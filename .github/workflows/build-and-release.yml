name: Build and Release MSIX

# Builds the WPF + Windows service with the .NET SDK on every push/PR, and builds the
# full signed MSIX package (UWP + WAP packaging project, which need the Visual Studio
# workloads available on the GitHub-hosted Windows runner). Pushing a tag like "v1.0.0"
# publishes a GitHub Release with the installable package attached.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  SOLUTION: DesktopBridge/DesktopBridge.sln
  WAPPROJ: DesktopBridge/WAPP/WAPP.wapproj
  CONFIGURATION: Release
  PLATFORM: x64
  # Password for the throwaway self-signed certificate generated in CI to sign the sideload package.
  PFX_PASSWORD: CIpassword123!

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      # Sanity check: WPF builds with the plain .NET SDK. The native TrayHelper (C++) and the
      # UWP app are built by the packaging project below.
      - name: Build WPF (.NET SDK)
        shell: pwsh
        run: dotnet build DesktopBridge/WPF/WPF.csproj -c $env:CONFIGURATION

      - name: Generate self-signed signing certificate
        id: cert
        shell: pwsh
        run: |
          # The certificate subject MUST match the Publisher in WAPP/Package.appxmanifest (CN=User).
          $securePwd = ConvertTo-SecureString -String $env:PFX_PASSWORD -Force -AsPlainText
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject 'CN=User' `
            -KeyUsage DigitalSignature `
            -FriendlyName 'DesktopBridge CI signing' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3', '2.5.29.19={text}')
          $pfxPath = Join-Path $env:RUNNER_TEMP 'signing.pfx'
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $securePwd | Out-Null
          "pfx=$pfxPath" >> $env:GITHUB_OUTPUT

      - name: Restore solution
        shell: pwsh
        run: msbuild $env:SOLUTION /t:Restore /p:Configuration=$env:CONFIGURATION /p:Platform=$env:PLATFORM

      - name: Build signed MSIX package
        shell: pwsh
        run: |
          msbuild $env:WAPPROJ `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxBundle=Never `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="${{ steps.cert.outputs.pfx }}" `
            /p:PackageCertificatePassword=$env:PFX_PASSWORD `
            /bl:"$env:GITHUB_WORKSPACE/msbuild.binlog" `
            "/flp:logfile=$env:GITHUB_WORKSPACE/msbuild.log;verbosity=normal" `
            "/flp1:logfile=$env:GITHUB_WORKSPACE/msbuild-errors.log;errorsonly"

      - name: Show MSBuild errors
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path "$env:GITHUB_WORKSPACE/msbuild-errors.log") {
            Write-Host '===== MSBuild errors ====='
            Get-Content "$env:GITHUB_WORKSPACE/msbuild-errors.log"
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-logs
          path: |
            ${{ github.workspace }}/msbuild.log
            ${{ github.workspace }}/msbuild-errors.log
            ${{ github.workspace }}/msbuild.binlog
          if-no-files-found: warn

      - name: Stage package output
        id: stage
        shell: pwsh
        run: |
          $appPackages = Join-Path $env:GITHUB_WORKSPACE 'DesktopBridge/WAPP/AppPackages'
          if (-not (Test-Path $appPackages)) {
            Write-Error "AppPackages folder not found at $appPackages"
            exit 1
          }
          $msix = Get-ChildItem -Path $appPackages -Recurse -Include *.msix, *.msixbundle | Select-Object -First 1
          if ($null -eq $msix) {
            Write-Error "No .msix produced under $appPackages"
            Get-ChildItem -Path $appPackages -Recurse | ForEach-Object { $_.FullName }
            exit 1
          }
          Write-Host "Found package: $($msix.FullName)"
          # Include our tray-enable + uninstall helper scripts alongside the generated installer.
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE 'build/EnableTray.ps1') -Destination $msix.DirectoryName -Force
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE 'build/Uninstall.ps1')  -Destination $msix.DirectoryName -Force
          $zip = Join-Path $env:GITHUB_WORKSPACE 'DesktopBridge-MSIX.zip'
          # Zip the whole sideload folder: it includes the .msix, the public .cer, the generated
          # Add-AppDevPackage.ps1, and our Install.ps1 (install + start tray immediately).
          Compress-Archive -Path (Join-Path $msix.DirectoryName '*') -DestinationPath $zip -Force
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "packagedir=$($msix.DirectoryName)" >> $env:GITHUB_OUTPUT

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopBridge-MSIX
          path: ${{ steps.stage.outputs.packagedir }}
          if-no-files-found: error

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.zip }}
          generate_release_notes: true
          body: |
            ## Install

            1. Download and extract **DesktopBridge-MSIX.zip**.
            2. Right-click **Add-AppDevPackage.ps1** → **Run with PowerShell** (installs the bundled
               self-signed certificate + dependencies + app).
            3. Right-click **EnableTray.ps1** → **Run with PowerShell** (no admin). It starts the tray
               icon now and registers a per-user logon autostart, so the tray appears on every
               sign-in **without launching the main app**. From the tray: **Open** / **Exit**.

            (To remove everything later, run **Uninstall.ps1**.)

            ### Prerequisites
            - Windows 10 version 1809 (build 17763) or later.
            - **.NET 8 Desktop Runtime (x64)** — https://dotnet.microsoft.com/download/dotnet/8.0
              (the WPF app is framework-dependent).

            > The package is signed with a throwaway self-signed certificate generated during CI,
            > intended for sideload testing only.
